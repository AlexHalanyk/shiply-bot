name: Tests

on:
  push:
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    env:
      # Dummy values: google-genai's Client raises at import time if
      # GEMINI_API_KEY is unset, and no real .env exists in CI.
      TELEGRAM_TOKEN: dummy-telegram-token
      GEMINI_API_KEY: dummy-gemini-api-key
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - run: pytest -q
